<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Szia Bubu!</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      overflow: hidden;
    }
    .bubu-text {
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      font-size: 4em;
      color: #ff69b4;
      text-shadow: 2px 2px 10px #fff;
      animation: pop 1.5s infinite alternate;
      user-select: none;
    }
    @keyframes pop {
      0% { transform: scale(1);}
      100% { transform: scale(1.1);}
    }

    .confetti {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      overflow: hidden;
      z-index: 99;
    }
    .piece {
      position: absolute;
      width: 16px; height: 16px;
      border-radius: 50%;
      opacity: 0.9;
      animation: fall 3s linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0);}
      80% { opacity: 1;}
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0;}
    }
  </style>
</head>
<body>
  <div class="bubu-text">Szia Bubu!</div>
  <div class="confetti"></div>
  <script>
    // Add Confetti!
    const colors = ['#ff69b4', '#ffd700', '#87cefa', '#77dd77', '#ffb347', '#e06666', '#b4a7d6'];
    const confettiCount = 44;
    const container = document.querySelector('.confetti');
    function randomBetween(a, b) {
      return a + Math.random() * (b - a);
    }
    for (let i = 0; i < confettiCount; ++i) {
      const conf = document.createElement('div');
      conf.className = 'piece';
      conf.style.left = `${randomBetween(0, 100)}vw`;
      conf.style.background = colors[Math.floor(Math.random() * colors.length)];
      conf.style.animationDelay = `${randomBetween(0, 2)}s`;
      container.appendChild(conf);
    }
  </script>
</body>
</html>
